            "Frank和Rose在房子内共舞，Rose在调第二首曲子时换上了黄绿碎花裙子（即《逃离方块》系列中Laura穿的裙子），Laura的手划破取出了血，莱纳德、Frank、Rose三人在地下室里献祭了自己和家族成员的血肉，巨大的树根吸收了所有的养分，产生了一个婴儿，之后Rose带着这个婴儿离开了锈湖，这个婴儿就是日后的《逃离方块》系列的女主Laura",

            "William的侄子，收到舅舅来信后搬入别墅，开启了这场以三代幸福为牺牲品的献祭",
            "锈湖系列游戏的女主，幼时母亲Rose被饿鬼带走，找回母亲途中第一次接触到锈湖，长大后和Bob恋爱，后因抑郁症自杀",
            "是Laura的男友，分手后一蹶不振，患病失忆来到了Laura提起过的白门心理健康和钓鱼中心",
            "是Jakob的奶奶，是是迫害Jakob的凶手之一，转世为Miss.Pigeon",

            "是锈湖旅馆的一把手，在杀害自己的亲人的转世入住旅馆时让Harvey将其逐个杀害",
            "被玩家称为最强打工人，在锈湖系列游戏中多次出现",
            "是Jakob的父亲的转世，被Harvey下毒杀害",
            "是Jakob的舅舅的转世，Havery在他的三明治中放屎，在其上厕所时布置机关，让墙上的斧头掉落将其杀害",

            "是Jakob的妹妹的转世，Havery给她拍照时举枪自杀",
        ];

        function searchCharacter() {
            const nameInput = document.getElementById('nameInput');
            const resultDiv = document.getElementById('result');
            const searchName = nameInput.value;
            
            const characterIndex = characters.findIndex(char =>char.toLocaleLowerCase()=== searchName.toLocaleLowerCase()
        );
             
            if (characterIndex != -1) {
                resultDiv.innerHTML = `${endings[characterIndex]}`;
            } 
        }
    </script>
